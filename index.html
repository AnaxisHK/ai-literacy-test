  {id:"D8",section:"D",q:"When using AI for business tasks, which usage pattern MAXIMISES productivity?",opts:["Have AI produce the final deliverable in one shot","You set the direction and outline, have AI create a draft, then you review and finalise","Let AI generate ideas from scratch and adopt them directly","Delegate all tasks to AI and just do the final approval yourself"],ans:1},

const SECTIONS={A:{name:"AI Fundamentals",icon:"\u{1F9E0}",count:8},B:{name:"Risks & Prohibited Actions",icon:"\u{1F6E1}",count:10},C:{name:"Data Privacy & Compliance",icon:"\u{1F512}",count:7},D:{name:"Practical Skills",icon:"\u{1F6E0}",count:8},E:{name:"Scenario Judgement",icon:"\u{1F4CB}",count:7}};
const TOTAL_TIME=20*60,GATE_THRESHOLD=0.8,LABELS=["(a)","(b)","(c)","(d)"];
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function formatTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function getLevel(s,t,g){if(!g||s/t<0.7)return"fail";if(s/t>=0.95)return"master";if(s/t>=0.85)return"advanced";return"certified";}
const LEVEL_INFO={
  fail:{label:"Not Passed",color:"#8B0000",bg:"#FFF0F0",border:"#FFB3B3",message:"You did not meet the passing criteria this time. We encourage you to review the seminar materials and retake the test."},
  certified:{label:"Certified",color:"#0A5C36",bg:"#F0FFF4",border:"#68D391",message:"Congratulations! You have demonstrated foundational AI literacy and safe usage awareness."},
  advanced:{label:"Advanced",color:"#1A4B8C",bg:"#EBF4FF",border:"#63B3ED",message:"Excellent! You have demonstrated strong AI literacy with outstanding safety awareness and practical skills."},
  master:{label:"Master",color:"#6B21A8",bg:"#FAF5FF",border:"#B794F4",message:"Outstanding! You have demonstrated expert-level AI literacy across all dimensions."},
};

// ─── EmailJS sender ───
function sendResults(regData, resultData) {
  const now = new Date();
  const dateStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  const params = {
    candidate_name: regData.name,
    candidate_email: regData.email,
    candidate_company: regData.company,
    level: LEVEL_INFO[resultData.level].label,
    overall_score: resultData.pct,
    correct: resultData.totalCorrect,
    total: resultData.totalQ,
    gate_score: resultData.bcPct,
    gate_status: resultData.gatePass ? "PASS" : "FAIL",
    score_a: resultData.scores.A,
    score_b: resultData.scores.B,
    score_c: resultData.scores.C,
    score_d: resultData.scores.D,
    score_e: resultData.scores.E,
    time_used: resultData.timeUsed,
    test_date: dateStr,
  };
  return emailjs.send("service_5upugc7", "template_fhrgbwi", params);
}

function App(){
  const[phase,setPhase]=useState("start");
  const[regData,setRegData]=useState({name:"",email:"",company:""});
  const[regErrors,setRegErrors]=useState({});
  const[questions,setQuestions]=useState([]);
  const[currentQ,setCurrentQ]=useState(0);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState(TOTAL_TIME);
  const[showConfirm,setShowConfirm]=useState(false);
  const[emailStatus,setEmailStatus]=useState("idle"); // idle|sending|sent|error
  const timerRef=useRef(null);
  const emailSentRef=useRef(false);

  const validateReg=()=>{
    const e={};
    if(!regData.name.trim())e.name="Please enter your name";
    if(!regData.email.trim())e.email="Please enter your email";
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(regData.email.trim()))e.email="Please enter a valid email address";
    if(!regData.company.trim())e.company="Please enter your company name";
    setRegErrors(e);return Object.keys(e).length===0;
  };
  const startTest=useCallback(()=>{
    const g={};Object.keys(SECTIONS).forEach(s=>g[s]=[]);
    QUESTIONS.forEach(q=>g[q.section].push(q));
    setQuestions(Object.keys(SECTIONS).flatMap(s=>shuffleArray(g[s])));
    setAnswers({});setCurrentQ(0);setTimeLeft(TOTAL_TIME);setEmailStatus("idle");emailSentRef.current=false;setPhase("test");
  },[]);

  useEffect(()=>{
    if(phase==="test"){
      timerRef.current=setInterval(()=>{
        setTimeLeft(p=>{if(p<=1){clearInterval(timerRef.current);setPhase("result");return 0;}return p-1;});
      },1000);
      return()=>clearInterval(timerRef.current);
    }
  },[phase]);

  const answeredCount=Object.keys(answers).length;
  const unansweredCount=questions.length-answeredCount;

  const results=useMemo(()=>{
    if(phase!=="result")return null;
    const ss={};Object.keys(SECTIONS).forEach(s=>ss[s]={correct:0,total:0});
    let tc=0;
    questions.forEach(q=>{ss[q.section].total++;if(answers[q.id]===q.ans){ss[q.section].correct++;tc++;}});
    const bc=ss.B.correct+ss.C.correct,bt=ss.B.total+ss.C.total,gp=bc/bt>=GATE_THRESHOLD;
    return{sectionScores:ss,totalCorrect:tc,bcCorrect:bc,bcTotal:bt,gatePass:gp,level:getLevel(tc,questions.length,gp),timeTaken:TOTAL_TIME-timeLeft};
  },[phase,answers,questions,timeLeft]);

  // Send email when results are ready
  useEffect(()=>{
    if(phase==="result" && results && !emailSentRef.current){
      emailSentRef.current=true;
      setEmailStatus("sending");
      const ss=results.sectionScores;
      const scores={};
      Object.keys(SECTIONS).forEach(s=>{scores[s]=ss[s].correct+"/"+ss[s].total+" ("+Math.round((ss[s].correct/ss[s].total)*100)+"%)"});
      const rd={
        level:results.level,
        pct:Math.round((results.totalCorrect/questions.length)*100),
        totalCorrect:results.totalCorrect,
        totalQ:questions.length,
        bcPct:Math.round((results.bcCorrect/results.bcTotal)*100),
        gatePass:results.gatePass,
        scores:scores,
        timeUsed:formatTime(results.timeTaken),
      };
      sendResults(regData, rd)
        .then(()=>setEmailStatus("sent"))
        .catch(()=>setEmailStatus("error"));
    }
  },[phase,results]);

  // ═══ START ═══
  if(phase==="start"){
    return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#0B1120 0%,#1A2744 40%,#0F1B2D 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Georgia','Times New Roman',serif"}},
      React.createElement("div",{style:{maxWidth:580,width:"100%",textAlign:"center"}},
        React.createElement(LogoImg,{style:{height:40,marginBottom:20}}),React.createElement("div",{style:{fontSize:13,letterSpacing:6,color:"#7B93B8",textTransform:"uppercase",marginBottom:12,fontFamily:"'Helvetica Neue',sans-serif"}},"Certification Examination"),
        React.createElement("h1",{style:{fontSize:32,color:"#E8EDF4",fontWeight:400,margin:"0 0 8px",lineHeight:1.3}},"AI Literacy",React.createElement("br"),"Proficiency Test"),
        React.createElement("div",{style:{width:60,height:2,background:"linear-gradient(90deg,#4A7AB5,#7B93B8)",margin:"20px auto",borderRadius:1}}),
        React.createElement("div",{style:{color:"#8BA3C4",fontSize:14,lineHeight:1.8,marginBottom:36,fontFamily:"'Helvetica Neue',sans-serif"}},
          React.createElement("p",{style:{margin:"0 0 16px"}},"40 questions \u00B7 20 minutes \u00B7 Multiple choice"),
          React.createElement("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"20px 24px",textAlign:"left",maxWidth:420,margin:"0 auto"}},
            React.createElement("div",{style:{marginBottom:14}},
              React.createElement("span",{style:{color:"#6B8BB5",fontSize:12,textTransform:"uppercase",letterSpacing:2}},"Passing Criteria"),
              React.createElement("p",{style:{margin:"6px 0 0",color:"#C4D4E8",fontSize:13}},"Overall score \u2265 70% ",React.createElement("span",{style:{color:"#7B93B8"}},"AND")," Sections B+C \u2265 80%")),
            React.createElement("div",null,
              React.createElement("span",{style:{color:"#6B8BB5",fontSize:12,textTransform:"uppercase",letterSpacing:2}},"Levels"),
              React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",marginTop:8,fontSize:13}},
                React.createElement("span",{style:{color:"#68D391"}},"Certified \u2014 70%+"),
                React.createElement("span",{style:{color:"#63B3ED"}},"Advanced \u2014 85%+"),
                React.createElement("span",{style:{color:"#B794F4"}},"Master \u2014 95%+"))))),
        React.createElement("button",{onClick:()=>setPhase("register"),style:{background:"linear-gradient(135deg,#3B6DAA,#4A7AB5)",color:"#fff",border:"none",padding:"14px 48px",borderRadius:8,fontSize:15,cursor:"pointer",letterSpacing:1,fontFamily:"'Helvetica Neue',sans-serif"}},"Begin Examination"),
        React.createElement("p",{style:{color:"#5A7396",fontSize:11,marginTop:16,fontFamily:"'Helvetica Neue',sans-serif"}},"Certification is valid for 1 year from the date of passing")));
  }

  // ═══ REGISTRATION ═══
  if(phase==="register"){
    const go=()=>{if(validateReg())startTest();};
    const kd=e=>{if(e.key==="Enter")go();};
    const fc="#4A7AB5";
    return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#0B1120 0%,#1A2744 40%,#0F1B2D 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Helvetica Neue',Arial,sans-serif"}},
      React.createElement("div",{className:"fade-in",style:{maxWidth:460,width:"100%"}},
        React.createElement("div",{style:{textAlign:"center",marginBottom:32}},
          React.createElement(LogoImg,{style:{height:36,marginBottom:16}}),React.createElement("div",{style:{fontSize:12,letterSpacing:4,color:"#7B93B8",textTransform:"uppercase",marginBottom:8}},"Registration"),
          React.createElement("h2",{style:{fontSize:24,color:"#E8EDF4",fontWeight:400,fontFamily:"Georgia,serif"}},"Enter Your Details"),
          React.createElement("p",{style:{color:"#7B93B8",fontSize:13,marginTop:8}},"This information will be used for your certification.")),
        React.createElement("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"32px 28px"}},
          React.createElement("div",{style:{marginBottom:24}},
